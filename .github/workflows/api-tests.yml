name: API Tests

on:
  push:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CONFIG: ${{ secrets.CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required env vars
        run: |
          if [ -z "$CONFIG" ]; then
            echo "CONFIG is required (set repository secret CONFIG)"
            exit 1
          fi

      - name: Wait for deployment propagation
        run: sleep 60

      - name: Run main route test
        shell: bash
        run: python tests/main-test.py

      - name: Run random image test
        shell: bash
        run: python tests/random-img-test.py
