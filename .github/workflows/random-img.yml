name: Random Img Test

on:
  push:
  workflow_dispatch:

jobs:
  random-img-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CONFIG: ${{ secrets.CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required env vars
        run: |
          if [ -z "$CONFIG" ]; then
            echo "CONFIG is required (set repository secret CONFIG)"
            exit 1
          fi

      - name: Wait for deployment propagation
        run: sleep 60

      - name: Run test
        shell: bash
        run: python random-img/test.py
