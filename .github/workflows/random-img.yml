name: Random Img Test

on:
  push:
  workflow_dispatch:

jobs:
  random-img-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      ASSET_BASE_URL: ${{ secrets.ASSET_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required env vars
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL is required (set repository secret BASE_URL)"
            exit 1
          fi
          if [ -z "$ASSET_BASE_URL" ]; then
            echo "ASSET_BASE_URL is required (set repository secret ASSET_BASE_URL)"
            exit 1
          fi

      - name: Run test
        shell: bash
        run: |
          set -euo pipefail

          run_once() {
            local log_file="$1"
            set +e
            python random-img/test.py 2>&1 | tee "$log_file"
            local cmd_exit=${PIPESTATUS[0]}
            set -e
            return "$cmd_exit"
          }

          first_log="$(mktemp)"
          if run_once "$first_log"; then
            exit 0
          fi

          if grep -Eiq 'IncompleteRead|RemoteDisconnected|request failed after retries|timed out|Temporary failure in name resolution|Connection reset by peer' "$first_log"; then
            echo "Transient network/read error detected, retrying once..."
            sleep 3
            second_log="$(mktemp)"
            if run_once "$second_log"; then
              exit 0
            fi
            exit 1
          fi

          echo "Non-transient failure, not retrying."
          exit 1
